<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Agenda Deportiva</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<link rel="manifest" href="data:application/json;charset=utf-8,{
  &quot;name&quot;: &quot;Mi Agenda Deportiva&quot;,
  &quot;short_name&quot;: &quot;Mi Agenda&quot;,
  &quot;description&quot;: &quot;Tu agenda deportiva personal&quot;,
  &quot;start_url&quot;: &quot;.&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;background_color&quot;: &quot;#0a0a0f&quot;,
  &quot;theme_color&quot;: &quot;#0a0a0f&quot;,
  &quot;orientation&quot;: &quot;portrait&quot;,
  &quot;icons&quot;: [{
    &quot;src&quot;: &quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0f'/><text y='.9em' font-size='90'>🏆</text></svg>&quot;,
    &quot;sizes&quot;: &quot;any&quot;,
    &quot;type&quot;: &quot;image/svg+xml&quot;,
    &quot;purpose&quot;: &quot;any maskable&quot;
  }]
}">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26; --border: #2a2a38;
    --text: #e8e8f0; --muted: #6b6b80;
    --tenis: #b5f03c; --futbol: #3cb5f0; --padel: #f0913c; --f1: #f03c3c; --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 90px; }

  header { padding: 28px 20px 16px; background: linear-gradient(180deg, #13131a 0%, transparent 100%); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; color: var(--white); line-height: 1; }
  header p { font-size: 0.72rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

  .tabs { display: flex; gap: 6px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 72px; z-index: 99; background: var(--bg); }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); font-size: 0.78rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .tab .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .tab[data-sport="tenis"]  { --c: var(--tenis); }
  .tab[data-sport="futbol"] { --c: var(--futbol); }
  .tab[data-sport="padel"]  { --c: var(--padel); }
  .tab[data-sport="f1"]     { --c: var(--f1); }
  .tab.active { color: var(--c); border-color: var(--c); background: transparent; }
  .tab.active .dot { background: var(--c); opacity: 1; }

  .panel { display: none; padding: 16px 20px; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .section-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; padding-left: 2px; display: flex; align-items: center; gap: 8px; }
  .section-label:first-child { margin-top: 4px; }
  .api-badge   { font-size: 0.58rem; background: rgba(60,181,240,0.1); color: var(--futbol); border: 1px solid rgba(60,181,240,0.2); border-radius: 4px; padding: 1px 6px; }
  .manual-badge { font-size: 0.58rem; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 2px 0 0 2px; }
  .card[data-sport="tenis"]::before  { background: var(--tenis); }
  .card[data-sport="futbol"]::before { background: var(--futbol); }
  .card[data-sport="padel"]::before  { background: var(--padel); }
  .card[data-sport="f1"]::before     { background: var(--f1); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 0.92rem; font-weight: 600; color: var(--white); line-height: 1.3; }
  .card-subtitle { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

  .badge { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-live     { background: rgba(240,60,60,0.15); color: #f03c3c; border: 1px solid rgba(240,60,60,0.3); }
  .badge-soon     { background: rgba(240,145,60,0.12); color: var(--padel); border: 1px solid rgba(240,145,60,0.3); }
  .badge-upcoming { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-finished { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: 0.6rem; }

  .card-meta { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--muted); }
  .meta-item strong { color: var(--text); font-weight: 500; }
  .channel-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 0.7rem; color: var(--text); font-weight: 500; }

  .score-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .score-team { font-size: 0.78rem; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-team.home { text-align: right; }
  .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--white); letter-spacing: 1px; background: var(--surface2); padding: 2px 12px; border-radius: 6px; flex-shrink: 0; }

  .loading { display: flex; align-items: center; gap: 8px; padding: 16px 2px; font-size: 0.78rem; color: var(--muted); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--futbol); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .edit-bar { display: flex; justify-content: flex-end; padding: 4px 20px 0; }
  .edit-btn { font-size: 0.72rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; transition: color 0.2s; }
  .edit-btn:hover { color: var(--text); border-color: var(--muted); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 500px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 4px; }
  .modal > p { font-size: 0.78rem; color: var(--muted); margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; color: var(--text); font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none; }
  .form-group select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; background: var(--white); color: var(--bg); border: none; border-radius: 12px; padding: 13px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 12px; padding: 13px 18px; font-size: 0.88rem; cursor: pointer; font-family: 'Inter', sans-serif; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(19,19,26,0.95); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; padding: 10px 0 20px; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 0; color: var(--muted); font-size: 0.62rem; letter-spacing: 0.5px; text-transform: uppercase; -webkit-tap-highlight-color: transparent; transition: color 0.2s; }
  .nav-item.active { color: var(--white); }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 0.85rem; line-height: 1.7; }
  .empty .emoji { font-size: 2.4rem; display: block; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>Mi Agenda</h1>
  <p>Deportes · Hora Chile</p>
</header>

<div class="tabs">
  <button class="tab active" data-sport="tenis"  onclick="switchTab('tenis')"><span class="dot"></span> Tenis</button>
  <button class="tab"        data-sport="futbol" onclick="switchTab('futbol')"><span class="dot"></span> Fútbol</button>
  <button class="tab"        data-sport="padel"  onclick="switchTab('padel')"><span class="dot"></span> Pádel</button>
  <button class="tab"        data-sport="f1"     onclick="switchTab('f1')"><span class="dot"></span> F1</button>
</div>

<div class="edit-bar">
  <button class="edit-btn" onclick="openModal()">+ Agregar evento</button>
</div>

<div id="tenis"  class="panel active"></div>
<div id="futbol" class="panel"></div>
<div id="padel"  class="panel"></div>
<div id="f1"     class="panel"></div>

<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Nuevo Evento</h2>
    <p>Agrega un partido o carrera a tu agenda</p>
    <div class="form-group"><label>Deporte</label>
      <select id="form-sport">
        <option value="tenis">Tenis</option><option value="futbol">Fútbol</option>
        <option value="padel">Pádel</option><option value="f1">Fórmula 1</option>
      </select>
    </div>
    <div class="form-group"><label>Evento</label>
      <input type="text" id="form-title" placeholder="ej. U de Chile vs Colo Colo">
    </div>
    <div class="form-group"><label>Fecha y hora (Chile)</label>
      <input type="datetime-local" id="form-date">
    </div>
    <div class="form-group"><label>Canal / Plataforma</label>
      <input type="text" id="form-channel" placeholder="ej. TNT Sports, Star+, Fox Sports">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="addManualEvent()">Agregar</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('tenis'); setNav(this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M2 12h20"/></svg>
    Tenis
  </div>
  <div class="nav-item" onclick="switchTab('futbol'); setNav(this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
    Fútbol
  </div>
  <div class="nav-item" onclick="switchTab('padel'); setNav(this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="11" height="16" rx="5"/><line x1="14" y1="11" x2="21" y2="18"/></svg>
    Pádel
  </div>
  <div class="nav-item" onclick="switchTab('f1'); setNav(this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><path d="M14 23a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M20 17v4h2"/></svg>
    F1
  </div>
</nav>

<script>
const API_KEY  = 'bf9d95d17ba4457da6167421ab47c104';
const BASE_URL = 'https://api.football-data.org/v4';

const COMPETITIONS = [
  { code: 'CL',  name: 'Champions League', channels: 'DAZN / ESPN' },
  { code: 'PL',  name: 'Premier League',   channels: 'ESPN / Star+' },
  { code: 'PD',  name: 'La Liga',          channels: 'ESPN / Star+' },
  { code: 'SA',  name: 'Serie A',          channels: 'ESPN / Star+' },
  { code: 'BL1', name: 'Bundesliga',       channels: 'ESPN / Star+' },
];

const defaultManual = [
  { id:'m1', sport:'tenis',  title:'ATP Estoril — Jarry / Barrios',     date:'2026-04-28T14:00', channel:'ESPN / Star+',      note:'Seguir en ATPTour.com' },
  { id:'m2', sport:'tenis',  title:'Roland Garros — Ronda inicial',      date:'2026-05-25T09:00', channel:'ESPN / Star+',      note:'Grand Slam · Tierra' },
  { id:'m3', sport:'futbol', title:'U de Chile — ANFP (agrega rival)',   date:'2026-04-12T18:00', channel:'TNT Sports Chile',  note:'Actualizar rival en anfp.cl' },
  { id:'m4', sport:'futbol', title:'Selección Chile — Eliminatorias',    date:'2026-06-08T20:30', channel:'Canal 13 / CHV',    note:'' },
  { id:'m5', sport:'padel',  title:'Premier Padel Madrid P2',            date:'2026-04-22T10:00', channel:'Star+ / YouTube',   note:'' },
  { id:'m6', sport:'padel',  title:'Premier Padel Roma',                 date:'2026-05-20T10:00', channel:'Star+',             note:'' },
  { id:'m7', sport:'f1',     title:'GP Arabia Saudí — Carrera',          date:'2026-04-19T17:00', channel:'Fox Sports / Star+',note:'' },
  { id:'m8', sport:'f1',     title:'GP Japón — Carrera',                 date:'2026-05-03T03:00', channel:'Fox Sports / Star+',note:'Madrugada Chile' },
  { id:'m9', sport:'f1',     title:'GP Miami — Carrera',                 date:'2026-05-10T15:00', channel:'Fox Sports / Star+',note:'' },
];

let manualEvents = JSON.parse(localStorage.getItem('manual_events') || 'null') || defaultManual;
let apiMatches   = {};
let nextId = 900;
let currentTab   = 'tenis';

function save() { localStorage.setItem('manual_events', JSON.stringify(manualEvents)); }

// ---- Date helpers ----
function chiDate(s) { return new Date(s); }
function fmtDate(d) { return d.toLocaleDateString('es-CL',  { weekday:'short', day:'numeric', month:'short', timeZone:'America/Santiago' }); }
function fmtTime(d) { return d.toLocaleTimeString('es-CL',  { hour:'2-digit', minute:'2-digit', timeZone:'America/Santiago' }); }
function isPast(d)  { return d < new Date(Date.now() - 7200000); }
function getStatus(d) {
  const diff = d - Date.now();
  if (diff < 0 && diff > -7200000) return 'live';
  if (diff >= 0 && diff < 86400000) return 'soon';
  return 'upcoming';
}
function stageLabel(s) {
  return { GROUP_STAGE:'Fase grupos', ROUND_OF_16:'Octavos', LAST_16:'Octavos',
           QUARTER_FINALS:'Cuartos',  LAST_8:'Cuartos', SEMI_FINALS:'Semifinal',
           LAST_4:'Semifinal', FINAL:'Final', REGULAR_SEASON:'' }[s] || '';
}

// ---- API ----
async function fetchComp(comp) {
  try {
    const now  = new Date();
    const from = new Date(now); from.setDate(from.getDate() - 4);
    const to   = new Date(now); to.setDate(to.getDate() + 35);
    const fmt  = d => d.toISOString().slice(0,10);
    const res  = await fetch(
      `${BASE_URL}/competitions/${comp.code}/matches?dateFrom=${fmt(from)}&dateTo=${fmt(to)}`,
      { headers: { 'X-Auth-Token': API_KEY } }
    );
    if (!res.ok) return [];
    const data = await res.json();
    return (data.matches || []).map(m => ({
      id: 'api_' + m.id, sport: 'futbol', fromApi: true,
      compCode: comp.code, compName: comp.name,
      title: `${m.homeTeam?.shortName || m.homeTeam?.name || '?'} vs ${m.awayTeam?.shortName || m.awayTeam?.name || '?'}`,
      homeTeam: m.homeTeam?.shortName || m.homeTeam?.name || '?',
      awayTeam: m.awayTeam?.shortName || m.awayTeam?.name || '?',
      date: m.utcDate, channel: comp.channels,
      status: m.status, stage: m.stage,
      scoreHome: m.score?.fullTime?.home,
      scoreAway: m.score?.fullTime?.away,
    }));
  } catch(e) { return []; }
}

async function loadAll() {
  const panel = document.getElementById('futbol');
  const el = document.createElement('div');
  el.className = 'loading'; el.id = 'api-loading';
  el.innerHTML = '<div class="spinner"></div> Cargando partidos europeos...';
  panel.prepend(el);

  const results = await Promise.all(COMPETITIONS.map(fetchComp));
  COMPETITIONS.forEach((c,i) => { apiMatches[c.code] = results[i]; });
  document.getElementById('api-loading')?.remove();
  renderPanel('futbol');
}

// ---- Card ----
function cardHTML(e) {
  const d      = chiDate(e.date);
  const past   = isPast(d);
  const isLive = e.status === 'IN_PLAY' || e.status === 'PAUSED';
  const isDone = e.status === 'FINISHED' || (past && !e.fromApi);

  let badge = '';
  if (isLive)       badge = '<span class="badge badge-live">● En vivo</span>';
  else if (isDone)  badge = '<span class="badge badge-finished">Finalizado</span>';
  else {
    const s = getStatus(d);
    if (s === 'soon') badge = '<span class="badge badge-soon">Hoy</span>';
    else              badge = '<span class="badge badge-upcoming">Próximo</span>';
  }

  const scoreHTML = (isLive || isDone) && e.scoreHome != null
    ? `<div class="score-row">
        <span class="score-team home">${e.homeTeam || e.title.split(' vs ')[0]}</span>
        <span class="score-num">${e.scoreHome} – ${e.scoreAway}</span>
        <span class="score-team">${e.awayTeam  || e.title.split(' vs ')[1] || ''}</span>
       </div>`
    : '';

  const sub = [e.compName, stageLabel(e.stage)].filter(Boolean).join(' · ');
  const delBtn = e.fromApi ? ''
    : `<button onclick="delManual('${e.id}')" style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:0.68rem;cursor:pointer;opacity:0.45;padding:4px 6px;">✕</button>`;

  return `<div class="card" data-sport="${e.sport}">
    <div class="card-top">
      <div>
        <div class="card-title">${e.title}</div>
        ${sub  ? `<div class="card-subtitle">${sub}</div>` : ''}
        ${e.note ? `<div class="card-subtitle">${e.note}</div>` : ''}
      </div>
      ${badge}
    </div>
    ${scoreHTML}
    <div class="card-meta">
      <div class="meta-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <strong>${fmtDate(d)}</strong>
      </div>
      <div class="meta-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <strong>${fmtTime(d)}</strong>
      </div>
      ${e.channel ? `<div class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg><span class="channel-tag">${e.channel}</span></div>` : ''}
    </div>
    ${delBtn}
  </div>`;
}

// ---- Render ----
function renderPanel(sport) {
  const panel = document.getElementById(sport);
  let html = '';

  if (sport === 'futbol') {
    const manual = manualEvents.filter(e => e.sport === 'futbol').sort((a,b) => new Date(a.date)-new Date(b.date));
    if (manual.length) {
      html += `<div class="section-label">Chile <span class="manual-badge">Manual</span></div>`;
      html += manual.map(cardHTML).join('');
    }
    COMPETITIONS.forEach(comp => {
      const all      = (apiMatches[comp.code] || []).sort((a,b) => new Date(a.date)-new Date(b.date));
      const upcoming = all.filter(m => m.status !== 'FINISHED');
      const finished = all.filter(m => m.status === 'FINISHED').slice(-2);
      if (!all.length) return;
      html += `<div class="section-label">${comp.name} <span class="api-badge">Auto</span></div>`;
      html += upcoming.map(cardHTML).join('');
      if (finished.length) {
        html += `<div class="section-label" style="margin-top:4px;font-size:0.6rem">Últimos resultados</div>`;
        html += finished.map(cardHTML).join('');
      }
    });
    if (!html) html = `<div class="empty"><span class="emoji">⚽</span>Cargando partidos...</div>`;

  } else {
    const evts     = manualEvents.filter(e => e.sport === sport).sort((a,b) => new Date(a.date)-new Date(b.date));
    const upcoming = evts.filter(e => !isPast(chiDate(e.date)));
    const past     = evts.filter(e =>  isPast(chiDate(e.date)));
    if (!evts.length) {
      html = `<div class="empty"><span class="emoji">📅</span>No hay eventos.<br>Agrega uno arriba.</div>`;
    } else {
      if (upcoming.length) { html += `<div class="section-label">Próximos</div>` + upcoming.map(cardHTML).join(''); }
      if (past.length)     { html += `<div class="section-label">Pasados</div>`  + past.map(cardHTML).join(''); }
    }
  }
  panel.innerHTML = html;
}

function renderAll() { ['tenis','futbol','padel','f1'].forEach(renderPanel); }

// ---- Nav ----
function switchTab(sport) {
  currentTab = sport;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.sport === sport));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === sport));
}
function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// ---- Modal ----
function openModal() {
  document.getElementById('form-sport').value = currentTab;
  document.getElementById('form-title').value = '';
  document.getElementById('form-channel').value = '';
  const d = new Date(); d.setDate(d.getDate()+1); d.setMinutes(0);
  document.getElementById('form-date').value = d.toISOString().slice(0,16);
  document.getElementById('modal').classList.add('open');
}
function closeModal()            { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e)    { if (e.target.id === 'modal') closeModal(); }

function addManualEvent() {
  const sport   = document.getElementById('form-sport').value;
  const title   = document.getElementById('form-title').value.trim();
  const date    = document.getElementById('form-date').value;
  const channel = document.getElementById('form-channel').value.trim();
  if (!title || !date) { alert('Completa el evento y la fecha.'); return; }
  manualEvents.push({ id:'m'+nextId++, sport, title, date, channel, note:'' });
  save(); renderAll(); switchTab(sport); closeModal();
}

function delManual(id) {
  if (!confirm('¿Eliminar este evento?')) return;
  manualEvents = manualEvents.filter(e => e.id !== id);
  save(); renderAll();
}

// ---- Init ----
renderAll();
loadAll();
</script>
</body>
